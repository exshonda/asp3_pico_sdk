#include "target_serial.h"

ATT_INI({ TA_NULL, 0, sio_initialize });
ATT_TER({ TA_NULL, 0, sio_terminate });

/*
 *  UART 受信割込み（ASP3 ネイティブ）
 *  RISC-V では pico-sdk の RX 割込み登録（mtvec 非互換）が使えないため，
 *  UART0 の RX 割込みを ASP3 の CRE_ISR で受ける（ハンドラ＝sio_isr）．
 *  UART ペリフェラル側の RX 割込み許可は sio_opn_por() で行う．
 */
CFG_INT(USART_INTNO, { TA_ENAINT, USART_INTPRI });
CRE_ISR(SIO_RX_ISR, { TA_NULL, 1, USART_INTNO, sio_isr, USART_ISRPRI });
